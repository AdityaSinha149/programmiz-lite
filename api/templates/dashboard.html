<!DOCTYPE html>

<html>
<head>
    <title>Dashboard</title>
</head>
<body>
    <h2>Welcome, {{ request.user.username }}</h2>

<h3>Your Folders:</h3>

{% if folders %}
    <ul>
        {% for folder in folders %}
            <li>{{ folder.name }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>No folders found.</p>
{% endif %}

<a href="/logout/">Logout</a>

</body>
</html>
